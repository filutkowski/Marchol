<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            height: 100vh;
            width: 100vw;
            background: whitesmoke;
            color: rgb(18, 21, 6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 {
            text-align: center;
        }
        p {
            color: black;
        }
    </style>
</head>
<body>
    <h1>Herunterladen</h1>
    <p></p>
    <script>
        const ws = new WebSocket('ws://localhost:2669'); // Verbindung zum WebSocket-Server

        // Verbindung geöffnet
        ws.onopen = () => {
            console.log('Mit WebSocket verbunden!');
        };

        // Nachricht empfangen
        ws.onmessage = (event) => {
            document.querySelector("p").innerText = event.data;
        };

        // Fehlerbehandlung
        ws.onerror = (error) => {
            console.error('WebSocket-Fehler:', error);
        };

        // Verbindung geschlossen
        ws.onclose = () => {
            console.log('WebSocket-Verbindung wurde geschlossen.');
        };
    </script>
</body>
</html>
