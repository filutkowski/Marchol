<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            height: 100vh;
            width: 100vw;
            background: whitesmoke;
            color: rgb(18, 21, 6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 {
            text-align: center;
        }
        p {
            color: black;
        }
    </style>
</head>
<body>
    <h1>pobieranie</h1>
    <p></p>
    <script>
        const ws = new WebSocket('ws://localhost:2669'); // Połączenie z WebSocket serwerem

// Obsługa otwarcia połączenia
ws.onopen = () => {
    console.log('Połączono z WebSocket!');
};

// Obsługa odbioru wiadomości
ws.onmessage = (event) => {
    document.querySelector("p").innerText = event.data;
};

// Obsługa błędów
ws.onerror = (error) => {
    console.error('Błąd WebSocket:', error);
};

// Obsługa zamknięcia połączenia
ws.onclose = () => {
    console.log('Połączenie z WebSocket zostało zamknięte.');
};
    </script>
</body>
</html>
